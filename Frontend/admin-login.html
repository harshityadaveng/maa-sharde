<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Maa Sharde Library</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fb;
      padding: 40px 20px;
    }

    .admin-card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 34px 32px;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .admin-card h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #0a192f;
    }

    .admin-card input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
    }

    .admin-card button.btn-login {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: #f5c542;
      color: #0a192f;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .admin-card button.btn-login:hover {
      background: #f5a800;
    }

    .admin-login-footer {
      margin-top: 18px;
      font-size: 14px;
      color: #555;
    }

    .admin-login-footer a {
      color: #0a192f;
      text-decoration: none;
      font-weight: bold;
    }

    .admin-message {
      min-height: 24px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .password-container {
      position: relative;
      width: 100%;
      margin-bottom: 18px;
    }

    .password-container input {
      width: 100%;
      padding-right: 60px;
      margin-bottom: 0;
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      font-size: 13px;
      font-weight: bold;
      outline: none;
      padding: 0;
    }

    .toggle-password:hover {
      color: #0a192f;
    }

    .forgot-link {
      display: block;
      margin-top: -6px;
      margin-bottom: 18px;
      font-size: 14px;
      color: #6b7280;
      text-decoration: none;
      text-align: right;
      font-weight: 500;
    }

    .forgot-link:hover {
      color: #0a192f;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <section class="admin-login-page">
    <div class="admin-card">
      <h1>Admin Login</h1>
      <p class="admin-message" id="adminLoginMessage"></p>
      <form id="adminLoginForm">
        <input id="adminEmail" type="email" placeholder="Email Address" required />
        <div class="password-container">
          <input id="adminPassword" type="password" placeholder="Password" required />
          <button type="button" class="toggle-password" id="togglePasswordBtn">Show</button>
        </div>
        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot Password?</a>
        <button type="submit" class="btn-login">Login to Dashboard</button>
      </form>
      <p class="admin-login-footer">
        <a href="/">Back to Website</a>
      </p>
    </div>
  </section>
  <script src="/admin.js"></script>
</body>

</html>
